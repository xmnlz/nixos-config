# true color
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on 

set-option -g focus-events on
set-option -sg escape-time 10

set -g pane-base-index 1
set -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# set -g status-left '#[bold]#S: #{?client_prefix,★ ,}'
# set -g status-right "#[fg=magenta]RAM: #(free -h | awk '/Mem:/ {print $3 \"/\" $2}')"

set -g status-style "bg=#1e1e2e"
set -g status-left-length 40
set -g status-right-length 50

set -g status-left '#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]#{?client_prefix,#[fg=#f38ba8] ★ ,  }'

set -g status-right '#[fg=#1e1e2e,bg=#1e1e2e]#[bg=#a6e3a1,fg=#1e1e2e] 󰍛 #[bold]#(free -h | awk "/Mem:/ {print \$3 \"/\" \$2}") '

# window tabs
set -g window-status-current-style "bg=#cba6f7,fg=#1e1e2e,bold"
set -g window-status-current-format " #I #W "
set -g window-status-style "fg=#6c7086"
set -g window-status-format " #I #W "
